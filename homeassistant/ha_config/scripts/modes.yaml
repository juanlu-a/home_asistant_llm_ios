# Home Assistant Scripts — Home Modes
# Replace entity IDs with your real devices after adding integrations
# Find entity IDs: Settings → Devices & Services → Entities

nap_mode:
  alias: "Nap Mode"
  description: "Dim lights and create a comfortable environment for a short rest."
  icon: mdi:sleep
  sequence:
    # TODO: Add your light entities here
    # - service: light.turn_on
    #   target:
    #     entity_id: light.YOUR_LIGHT
    #   data:
    #     brightness_pct: 20
    - service: climate.set_temperature
      target:
        entity_id: climate.samsung_ac  # Update with your AC entity
      data:
        temperature: 22
        hvac_mode: cool
    - service: input_text.set_value
      target:
        entity_id: input_text.last_selected_mode
      data:
        value: "nap_mode"
  mode: single

sleep_mode:
  alias: "Sleep Mode"
  description: "Turn off lights, set night temperature, prepare the home for sleeping."
  icon: mdi:weather-night
  sequence:
    # TODO: Add your light entities here
    # - service: light.turn_off
    #   target:
    #     entity_id: light.YOUR_LIGHTS
    - service: climate.set_temperature
      target:
        entity_id: climate.samsung_ac  # Update with your AC entity
      data:
        temperature: 20
        hvac_mode: cool
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.mode_sleep
    - service: input_text.set_value
      target:
        entity_id: input_text.last_selected_mode
      data:
        value: "sleep_mode"
  mode: single

away_mode:
  alias: "Away Mode"
  description: "Turn off non-essential lights, set eco temperature, activate away helpers."
  icon: mdi:home-export-outline
  sequence:
    # TODO: Add your light entities here
    # - service: light.turn_off
    #   target:
    #     entity_id: light.YOUR_LIGHTS
    - service: climate.turn_off
      target:
        entity_id: climate.samsung_ac  # Update with your AC entity
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.mode_away
    - service: input_text.set_value
      target:
        entity_id: input_text.last_selected_mode
      data:
        value: "away_mode"
  mode: single

