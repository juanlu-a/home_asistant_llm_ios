  alias: "Movie Mode"
  description: "Dim living room lights for a cinema atmosphere."
  icon: mdi:movie-open
  sequence:
    # TODO: Add your Govee light entities here
    # - service: light.turn_on
    #   target:
    #     entity_id: light.YOUR_GOVEE_LIGHT
    #   data:
