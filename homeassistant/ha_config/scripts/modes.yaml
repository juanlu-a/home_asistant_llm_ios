all_off:
  alias: "All Off"
  description: "Turn off every light in the home."
  icon: mdi:power-off
  sequence:
    # TODO: Add your light entities here
    # - service: light.turn_off
    #   target:
    #     entity_id: all  # or list specific lights
    - service: climate.turn_off
      target:
        entity_id: climate.samsung_ac  # Update with your AC entity
    - service: input_text.set_value
      target:
        entity_id: input_text.last_selected_mode
      data:
        value: "all_off"
  mode: single

good_morning:
  alias: "Good Morning"
  description: "Bright, energising lights and a comfortable daytime temperature."
  icon: mdi:weather-sunny
  sequence:
    # TODO: Add your light entities here
    # - service: light.turn_on
    #   target:
    #     entity_id: light.YOUR_LIGHTS
    #   data:
    #     brightness_pct: 100
    - service: climate.set_temperature
      target:
        entity_id: climate.samsung_ac  # Update with your AC entity
      data:
        temperature: 23
        hvac_mode: auto
    - service: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.mode_sleep
          - input_boolean.mode_away
    - service: input_text.set_value
      target:
        entity_id: input_text.last_selected_mode
      data:
        value: "good_morning"
  mode: single
