    - service: input_text.set_value
      target:
        entity_id: input_text.last_selected_mode
      data:
        value: "movie_mode"
  mode: single

cozy_mode:
  alias: "Cozy Mode"
  description: "Warm, moderate lighting in living areas for a relaxing atmosphere."
  icon: mdi:candle
  sequence:
    # TODO: Add your light entities here
    # - service: light.turn_on
    #   target:
    #     entity_id: light.YOUR_LIGHTS
    #   data:
    #     brightness_pct: 45
    - service: input_text.set_value
      target:
        entity_id: input_text.last_selected_mode
      data:
        value: "cozy_mode"
